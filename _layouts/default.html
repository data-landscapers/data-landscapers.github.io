<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
</head>
<body>
<div class="site-wrap">

  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        Data Landscapers
        <span class="site-logo__sub">Mapping Africa's data landscape</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="this.classList.toggle('open'); document.getElementById('site-nav').classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="site-nav" aria-label="Main navigation">
        <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>About</a>
        <a href="{{ '/writing/' | relative_url }}" {% if page.url contains '/writing' or page.layout == 'article' %}class="active"{% endif %}>Writing</a>
        <a href="{{ '/portfolio/' | relative_url }}" {% if page.url contains '/portfolio' %}class="active"{% endif %}>Portfolio</a>
        <a href="{{ '/wip/' | relative_url }}" {% if page.url contains '/wip' %}class="active"{% endif %}>Work in progress</a>
        <a href="{{ '/contact/' | relative_url }}" {% if page.url contains '/contact' %}class="active"{% endif %}>Contact</a>
      </nav>
    </div>
  </header>

  <main id="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="site-footer__copy">
        © {{ 'now' | date: '%Y' }} Data Landscapers Ltd &nbsp;·&nbsp; Registered in the UK &nbsp;·&nbsp; Co. No. 16040544
      </p>
      <div class="site-footer__links">
        <a href="https://linkedin.com/in/billanderson10" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/data-landscapers" target="_blank" rel="noopener">GitHub</a>
        <a href="{{ '/contact/' | relative_url }}">Contact</a>
      </div>
    </div>
  </footer>

</div>
</body>
</html>
